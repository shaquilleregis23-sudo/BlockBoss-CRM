<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BlockBoss SaaS Operations</title><style>
*{box-sizing:border-box}body{margin:0;background:#0d1117;color:#e6edf3;font:14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh}:root{--panel:#161b22;--border:#30363d;--muted:#8b949e;--green:#3fb950;--blue:#58a6ff;--red:#f85149;--gold:#d29922}.login{max-width:390px;margin:12vh auto;padding:28px;background:var(--panel);border:1px solid var(--border);border-radius:18px}.login h1{margin:0 0 5px}.muted{color:var(--muted)}input,select,textarea{width:100%;padding:11px 12px;margin:8px 0;border:1px solid var(--border);border-radius:9px;background:#0d1117;color:white}button{border:0;border-radius:9px;padding:10px 14px;background:#238636;color:white;font-weight:750;cursor:pointer}.wide{width:100%}.app{display:none;max-width:1280px;margin:auto;padding:22px}.head,.tabs,.row{display:flex;align-items:center;gap:10px}.head{justify-content:space-between;margin-bottom:20px}.head h1{font-size:22px}.ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}.tabs{overflow:auto;margin-bottom:18px}.tabs button{white-space:nowrap;background:var(--panel);border:1px solid var(--border);color:var(--muted)}.tabs button.active{background:#1f6feb;color:white}.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:18px}.kpi,.panel{background:var(--panel);border:1px solid var(--border);border-radius:14px}.kpi{padding:16px}.kpi b{font-size:25px;display:block}.kpi span{font-size:10px;text-transform:uppercase;color:var(--muted)}.panel{padding:16px;overflow:auto}.view{display:none}.view.active{display:block}table{width:100%;border-collapse:collapse;min-width:850px}th,td{text-align:left;padding:10px;border-bottom:1px solid var(--border);font-size:12px}th{color:var(--muted);font-size:10px;text-transform:uppercase}.badge{display:inline-block;padding:3px 8px;border-radius:99px;background:#30363d}.active,.resolved{color:var(--green)}.pending,.in_progress{color:var(--gold)}.canceled,.failed,.urgent,.error{color:var(--red)}.bar{height:6px;background:#30363d;border-radius:9px;overflow:hidden;min-width:70px}.bar i{display:block;height:100%;background:var(--green)}.support-card{border:1px solid var(--border);padding:13px;border-radius:11px;margin:9px 0;background:#0d1117}.support-card h3{margin:0 0 5px}.support-card small{color:var(--muted)}.actions{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.actions button{background:#1f6feb}.actions button.gold{background:#9e6a03}.empty{padding:30px;text-align:center;color:var(--muted)}@media(max-width:800px){.kpis{grid-template-columns:repeat(2,1fr)}.app{padding:12px}.head{align-items:flex-start}.head .actions{justify-content:flex-end}}
</style></head><body>
<div class="login" id="login"><h1>BlockBoss Operations</h1><p class="muted">Private SaaS owner dashboard</p><input id="pass" type="password" placeholder="Admin password"><button class="wide" id="signIn">Sign In</button><p id="err" class="failed"></p></div>
<div class="app" id="app"><div class="head"><div><h1>BlockBoss <span style="color:var(--green)">SaaS Operations</span></h1><div class="muted" id="stamp">Loading…</div></div><div class="actions"><button id="refresh">Refresh</button><button class="gold" id="lifecycle">Run Lifecycle</button><button class="ghost" id="logout">Sign Out</button></div></div>
<div class="kpis"><div class="kpi"><b id="total">—</b><span>Customers</span></div><div class="kpi"><b id="active">—</b><span>Active / Trial</span></div><div class="kpi"><b id="mrr">—</b><span>MRR</span></div><div class="kpi"><b id="arr">—</b><span>ARR</span></div><div class="kpi"><b id="supportKpi">—</b><span>Open Support</span></div><div class="kpi"><b id="webhookKpi">—</b><span>Webhook Failures</span></div></div>
<div class="tabs"><button class="active" data-tab="customers">Customers</button><button data-tab="support">Support</button><button data-tab="billing">Billing Events</button><button data-tab="health">Production Health</button></div>
<section class="view active panel" id="customers"></section><section class="view panel" id="support"></section><section class="view panel" id="billing"></section><section class="view panel" id="health"></section></div>
<script>
const URL='https://cghblukwgsqqwedlzmgh.supabase.co/functions/v1/admin-data';let password='',data=null;const $=id=>document.getElementById(id),e=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
async function api(method='GET',body){const r=await fetch(URL,{method,headers:{'x-admin-password':password,'content-type':'application/json'},body:body?JSON.stringify(body):undefined});const d=await r.json();if(!r.ok)throw Error(d.error||'Request failed');return d}
async function login(){password=$('pass').value.trim();if(!password)return;$('signIn').textContent='Checking…';try{data=await api();sessionStorage.setItem('bb_admin',password);$('login').style.display='none';$('app').style.display='block';render()}catch(x){$('err').textContent=x.message;$('signIn').textContent='Sign In'}}
async function load(){try{data=await api();render()}catch(x){alert(x.message)}}
function badge(v){return `<span class="badge ${e(v)}">${e(v||'none')}</span>`}function maint(a){const r=a.maintenance?.[0];return r?`${badge(r.status)} ${e(r.job_type)}<br><small>${new Date(r.started_at).toLocaleString()}</small>`:'—'}
function render(){
 $('total').textContent=data.total;$('active').textContent=data.active;$('mrr').textContent='$'+Number(data.mrr).toLocaleString();$('arr').textContent='$'+(Number(data.mrr)*12).toLocaleString();$('supportKpi').textContent=data.open_support;$('webhookKpi').textContent=data.webhook_failures;$('stamp').textContent='Updated '+new Date().toLocaleString();
 $('customers').innerHTML=`<table><thead><tr><th>Customer</th><th>Plan</th><th>Usage</th><th>Activation</th><th>Support</th><th>Maintenance</th><th>Stripe</th></tr></thead><tbody>${(data.accounts||[]).map(a=>`<tr><td><b>${e(a.name||'—')}</b><br><small>${e(a.email)}</small></td><td>${badge(a.plan_status)}<br>${e(a.plan_key||'none')}</td><td>${Number(a.leads).toLocaleString()} leads<br>${a.agents} agents</td><td><div class="bar"><i style="width:${a.activation_pct}%"></i></div><small>${a.activation_pct}%</small></td><td>${a.open_support||0} open</td><td>${maint(a)}</td><td>${a.stripe_customer_id?`<a style="color:var(--blue)" target="_blank" rel="noopener" href="https://dashboard.stripe.com/customers/${encodeURIComponent(a.stripe_customer_id)}">Open Stripe</a>`:'Not linked'}</td></tr>`).join('')}</tbody></table>`;
 $('support').innerHTML=(data.support||[]).map(s=>`<article class="support-card"><div class="row" style="justify-content:space-between"><h3>${e(s.subject)}</h3>${badge(s.priority)}</div><small>${e(s.reporter_email)} · ${e(s.category)} · ${new Date(s.created_at).toLocaleString()}</small><p>${e(s.description)}</p><div class="row"><select data-support="${e(s.id)}"><option ${s.status==='open'?'selected':''}>open</option><option ${s.status==='in_progress'?'selected':''}>in_progress</option><option ${s.status==='resolved'?'selected':''}>resolved</option></select><button onclick="updateSupport('${e(s.id)}',this.previousElementSibling.value)">Save Status</button></div></article>`).join('')||'<div class="empty">No support requests</div>';
 $('billing').innerHTML=`<table><thead><tr><th>Received</th><th>Event</th><th>Status</th><th>Event ID</th><th>Error</th></tr></thead><tbody>${(data.webhooks||[]).map(w=>`<tr><td>${new Date(w.received_at).toLocaleString()}</td><td>${e(w.event_type)}</td><td>${badge(w.status)}</td><td>${e(w.event_id)}</td><td>${e(w.error||'—')}</td></tr>`).join('')}</tbody></table>`;
 $('health').innerHTML=`<table><thead><tr><th>Time</th><th>Level</th><th>Category</th><th>Team</th><th>Message</th></tr></thead><tbody>${(data.health||[]).map(h=>`<tr><td>${new Date(h.created_at).toLocaleString()}</td><td>${badge(h.level)}</td><td>${e(h.category)}</td><td>${e(h.team_id)}</td><td>${e(h.message)}</td></tr>`).join('')}</tbody></table>`;
}
async function updateSupport(id,status){await api('PATCH',{action:'support_status',id,status});await load()}$('signIn').onclick=login;$('pass').onkeydown=x=>{if(x.key==='Enter')login()};$('refresh').onclick=load;$('lifecycle').onclick=async()=>{const d=await api('POST',{action:'run_lifecycle'});alert(`Lifecycle checked ${d.checked||0}; sent ${d.sent||0}`);load()};$('logout').onclick=()=>{sessionStorage.removeItem('bb_admin');location.reload()};document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-tab]').forEach(x=>x.classList.toggle('active',x===b));document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id===b.dataset.tab))});const saved=sessionStorage.getItem('bb_admin');if(saved){$('pass').value=saved;login()}
</script></body></html>
